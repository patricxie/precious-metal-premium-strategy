main:
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - owner: "patricxie"
          - repo: "precious-metal-premium-strategy"
          - workflow_id: "daily_update.yml"
          - secret_id: "github-actions-dispatch-token"

    - access_github_token:
        call: googleapis.secretmanager.v1.projects.secrets.versions.accessString
        args:
          project_id: ${project_id}
          secret_id: ${secret_id}
          version: "latest"
        result: github_token

    - dispatch_daily_update:
        call: http.post
        args:
          url: ${"https://api.github.com/repos/" + owner + "/" + repo + "/actions/workflows/" + workflow_id + "/dispatches"}
          headers:
            Accept: "application/vnd.github+json"
            Authorization: ${"Bearer " + github_token}
            X-GitHub-Api-Version: "2022-11-28"
            User-Agent: "gcp-workflows-cloud-scheduler"
          body:
            ref: "main"
        result: dispatch_response

    - done:
        return:
          status_code: ${dispatch_response.code}
          owner: ${owner}
          repo: ${repo}
          workflow_id: ${workflow_id}
