name: Daily ETL Update

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-etl-update
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update pipeline
        run: |
          python run_daily_update.py

      - name: Show pipeline log if failed
        if: failure()
        run: |
          echo "===== daily_update_log.txt ====="
          if [ -f data/processed/daily_update_log.txt ]; then
            cat data/processed/daily_update_log.txt
          else
            echo "daily_update_log.txt not found"
          fi

      - name: Show last_update.json if failed
        if: failure()
        run: |
          echo "===== last_update.json ====="
          if [ -f data/processed/last_update.json ]; then
            cat data/processed/last_update.json
          else
            echo "last_update.json not found"
          fi

      - name: Stage generated artifacts
        if: success()
        run: |
          git add \
            extract/data/*.csv \
            transform/data/*.csv \
            data/processed/*.csv \
            data/processed/*.json \
            data/processed/*.pdf \
            data/processed/charts/*.png

      - name: Verify last_update.json was staged
        if: success()
        run: |
          if git diff --cached --quiet -- data/processed/last_update.json; then
            echo "data/processed/last_update.json was not updated by this run"
            exit 1
          fi

      - name: Detect changes
        if: success()
        id: changes
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated files
        if: success() && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto update market data"

      - name: Push changes
        if: success() && steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin HEAD:main

      - name: Verify last_update.json was pushed to GitHub
        if: success() && steps.changes.outputs.has_changes == 'true'
        run: |
          for attempt in 1 2 3 4 5; do
            git fetch origin main --depth=1
            git show origin/main:data/processed/last_update.json > /tmp/remote_last_update.json

            if cmp -s data/processed/last_update.json /tmp/remote_last_update.json; then
              echo "Verified: last_update.json was pushed to origin/main"
              exit 0
            fi

            echo "Remote last_update.json does not match local file yet. Retry ${attempt}/5..."
            sleep 5
          done

          echo "Local last_update.json:"
          cat data/processed/last_update.json
          echo
          echo "Remote last_update.json:"
          cat /tmp/remote_last_update.json
          exit 1

      - name: Notify LINE
        if: always()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
          JOB_STATUS: ${{ job.status }}
          CHANGES_PUSHED: ${{ steps.changes.outputs.has_changes }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "${LINE_CHANNEL_ACCESS_TOKEN}" ] || [ -z "${LINE_TO_ID}" ]; then
            echo "LINE_CHANNEL_ACCESS_TOKEN or LINE_TO_ID is not set; skipping notification."
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          changes_pushed = os.environ.get("CHANGES_PUSHED") == "true"

          payload = {
              "job_status": os.environ.get("JOB_STATUS", "unknown"),
              "changes_pushed": changes_pushed,
              "repository": os.environ.get("REPOSITORY"),
              "workflow": os.environ.get("WORKFLOW_NAME"),
              "ref_name": os.environ.get("REF_NAME"),
              "event_name": os.environ.get("EVENT_NAME"),
              "run_id": os.environ.get("RUN_ID"),
              "run_url": f"{os.environ.get('SERVER_URL')}/{os.environ.get('REPOSITORY')}/actions/runs/{os.environ.get('RUN_ID')}",
              "head_sha": subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip(),
          }

          last_update_path = Path("data/processed/last_update.json")
          if last_update_path.exists():
              payload["last_update"] = json.loads(last_update_path.read_text(encoding="utf-8"))
          else:
              payload["last_update"] = {
                  "last_update_time": None,
                  "status": "unknown",
                  "message": "last_update.json not found",
              }

          last_update = payload["last_update"]
          icon = "✅" if payload["job_status"] == "success" else "❌"
          line_message = "\n".join(
              [
                  f"{icon} Precious Metal ETL {payload['job_status']}",
                  f"Last Update: {last_update.get('last_update_time') or 'N/A'}",
                  f"Status: {last_update.get('status') or 'N/A'}",
                  f"Message: {last_update.get('message') or 'N/A'}",
                  f"Changes Pushed: {'true' if changes_pushed else 'false'}",
                  f"Run: {payload['run_url']}",
              ]
          )

          line_payload = {
              "to": os.environ["LINE_TO_ID"],
              "messages": [
                  {
                      "type": "text",
                      "text": line_message,
                  }
              ],
          }

          Path("/tmp/line_push_payload.json").write_text(
              json.dumps(line_payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          curl --fail --silent --show-error \
            -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Authorization: Bearer ${LINE_CHANNEL_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @/tmp/line_push_payload.json
