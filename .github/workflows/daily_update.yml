name: Daily Data Update

on:
  schedule:
    # UTC 00:30 = 台灣時間 08:30
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update pipeline
        run: |
          python run_daily_update.py

      - name: Show pipeline log if failed
        if: failure()
        run: |
          echo "===== daily_update_log.txt ====="
          if [ -f data/processed/daily_update_log.txt ]; then
            cat data/processed/daily_update_log.txt
          else
            echo "daily_update_log.txt not found"
          fi

      - name: Show last_update.json if failed
        if: failure()
        run: |
          echo "===== last_update.json ====="
          if [ -f data/processed/last_update.json ]; then
            cat data/processed/last_update.json
          else
            echo "last_update.json not found"
          fi

      - name: Commit updated files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/processed extract/data transform/data database
          git diff --cached --quiet || git commit -m "Auto update market data"

      - name: Push changes
        if: success()
        run: |
          git push
