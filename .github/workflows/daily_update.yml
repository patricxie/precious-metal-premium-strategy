name: Daily ETL Update

on:
  schedule:
    # 00:30 UTC = 08:30 Asia/Taipei
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-etl-update
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update pipeline
        run: |
          python run_daily_update.py

      - name: Show pipeline log if failed
        if: failure()
        run: |
          echo "===== daily_update_log.txt ====="
          if [ -f data/processed/daily_update_log.txt ]; then
            cat data/processed/daily_update_log.txt
          else
            echo "daily_update_log.txt not found"
          fi

      - name: Show last_update.json if failed
        if: failure()
        run: |
          echo "===== last_update.json ====="
          if [ -f data/processed/last_update.json ]; then
            cat data/processed/last_update.json
          else
            echo "last_update.json not found"
          fi

      - name: Stage generated artifacts
        if: success()
        run: |
          git add \
            extract/data/*.csv \
            transform/data/*.csv \
            data/processed/*.csv \
            data/processed/*.json \
            data/processed/*.pdf \
            data/processed/charts/*.png

      - name: Detect changes
        if: success()
        id: changes
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated files
        if: success() && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto update market data"

      - name: Push changes
        if: success() && steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin HEAD:main
